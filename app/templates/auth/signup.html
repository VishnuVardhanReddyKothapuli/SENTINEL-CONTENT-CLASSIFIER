{% extends "base.html" %}
{% block title %}Sign Up - Sentinel{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create account</h1>
            <p>Start classifying content for free</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <!-- Google Sign Up -->
        <a href="/auth/google" class="btn btn-google btn-full">
            <img src="/static/img/google-icon.svg" alt="Google" width="20">
            Sign up with Google
        </a>

        <div class="divider"><span>or</span></div>

        <!-- Registration Form -->
        <form action="/auth/signup" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="cooluser123" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min 8 characters" minlength="8" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <p class="auth-switch">
            Already have an account? <a href="/auth/login">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
