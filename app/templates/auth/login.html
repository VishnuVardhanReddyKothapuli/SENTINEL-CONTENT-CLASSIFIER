{% extends "base.html" %}
{% block title %}Login - Sentinel{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome back</h1>
            <p>Log in to your Sentinel account</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <!-- Google Sign In -->
        <a href="/auth/google" class="btn btn-google btn-full">
            <img src="/static/img/google-icon.svg" alt="Google" width="20">
            Continue with Google
        </a>

        <div class="divider"><span>or</span></div>

        <!-- Email/Password Form -->
        <form action="/auth/login" method="post" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Log In</button>
        </form>

        <p class="auth-switch">
            Don't have an account? <a href="/auth/signup">Sign up free</a>
        </p>
    </div>
</div>
{% endblock %}
