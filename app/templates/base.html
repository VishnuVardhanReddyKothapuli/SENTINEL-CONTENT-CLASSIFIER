<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sentinel - A Safety Platform Gateway{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar">
    <a href="/" class="nav-logo">
        <span class="logo-icon"></span>
        <span>Sentinel</span>
    </a>
    <div class="nav-links">
        {% if user %}
            <span class="nav-username">{{ user.username or user.email }}</span>
            <a href="/classify/lab" class="btn btn-outline">Lab</a>
            <a href="/auth/logout" class="btn btn-ghost">Logout</a>
        {% else %}
            <a href="/auth/login" class="btn btn-outline">Login</a>
            <a href="/auth/signup" class="btn btn-primary">Sign Up</a>
        {% endif %}
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<script src="/static/js/main.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
